<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Wars</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <div id="app">

        <form action="">
            <input type="text" placeholder="Busca por nome..." v-model="searchName" />
            <button type="button" @click="searchTerm()">Buscar</button>
        </form>
        <h1>{{ title }}</h1>
        <small>Olá, {{ userName }}!</small>
        
        <div class="characters">
            <div class="item" v-for="item of characters" :key="item.id">
                <h2>{{ item.nome }}</h2>
                <img :src="item.avatar" :alt="item.nome">
                <button @click="like(item.nome)">Like</button>
                <button @click="remove(item.id)">Remover</button>
            </div>
        </div>
    </div>
    <script type="text/javascript" src="js/vue.js">   
    </script>
    <script type="text/javascript" src="js/app.js">   
    </script>
</body>
</html>
